<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Signal Hunt .io - Multiplayer</title>
    <style>
        body { margin: 0; background: #000; color: #00ff41; font-family: sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { border: 2px solid #00ff41; background: #050505; display: none; box-shadow: 0 0 20px #00ff41; cursor: none; }
        #menu { text-align: center; border: 2px solid #00ff41; padding: 40px; background: #000; box-shadow: 0 0 30px #00ff41; z-index: 10; }
        button { background: #00ff41; color: #000; border: none; padding: 15px 30px; font-size: 20px; cursor: pointer; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #fff; transform: scale(1.1); }
        .stat { position: absolute; top: 10px; left: 10px; color: #00ff41; font-size: 20px; display: none; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

<div id="stat" class="stat">Bandwidth: 0 KB | Online: 0</div>

<div id="menu">
    <h1 style="letter-spacing: 5px;">SIGNAL HUNT .io</h1>
    <p>เชื่อมต่อระบบเพื่อแย่งชิงสัญญาณกับคนอื่นๆ</p>
    <button onclick="startGame()">CONNECT TO SERVER</button>
</div>

<canvas id="gameCanvas"></canvas>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const socket = io();
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const menu = document.getElementById('menu');
const stat = document.getElementById('stat');

let myId = null;
let allPlayers = {};
let pings = [];
let mouse = { x: 0, y: 0 };
let isRunning = false;

// รับ ID ของตัวเองจาก Server
socket.on('connect', () => { myId = socket.id; });

function startGame() {
    menu.style.display = 'none';
    canvas.style.display = 'block';
    stat.style.display = 'block';
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    isRunning = true;
    loop();
}

window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    // ส่งตำแหน่งให้ Server ตลอดเวลา
    if(isRunning) {
        socket.emit('playerMove', { x: mouse.x, y: mouse.y });
    }
});

// อัปเดตข้อมูลผู้เล่นและอาหารจาก Server
socket.on('updateGameState', (data) => {
    allPlayers = data.players;
    pings = data.pings;
    
    // อัปเดต UI ของตัวเอง
    if (allPlayers[socket.id]) {
        stat.innerHTML = `Bandwidth: ${Math.floor(allPlayers[socket.id].score)} KB | Online: ${Object.keys(allPlayers).length}`;
    }
});

function loop() {
    if(!isRunning) return;

    // ล้างจอแบบทิ้งหาง (Motion Blur)
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)'; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 1. วาดอาหาร (Pings) ที่ได้รับจาก Server
    ctx.fillStyle = 'white';
    pings.forEach((p) => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
        ctx.fill();
    });

    // 2. วาดผู้เล่นทุกคนใน Server
    for (let id in allPlayers) {
        let p = allPlayers[id];
        
        ctx.shadowBlur = id === socket.id ? 20 : 5; // ตัวเราเองจะเรืองแสงกว่าคนอื่น
        ctx.shadowColor = p.color;
        ctx.fillStyle = p.color;
        
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // วาดชื่อ ID สั้นๆ บนหัวผู้เล่นคนอื่น
        if (id !== socket.id) {
            ctx.fillStyle = 'white';
            ctx.font = '12px sans-serif';
            ctx.fillText("User_" + id.substring(0, 4), p.x - 20, p.y - (p.r + 10));
        }
    }

    requestAnimationFrame(loop);
}

window.addEventListener('resize', () => {
    if(isRunning) {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
});
</script>
</body>
</html>
